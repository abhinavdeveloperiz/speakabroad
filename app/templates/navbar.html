{% load static %}

<!-- NAVBAR -->

<nav id="navbar"
    class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-dark/40 backdrop-blur-lg">

    <div id="nav-container"
        class="max-w-7xl mx-auto px-6 flex justify-between items-center transition-all duration-300 h-24">

        <!-- Logo -->
        <a href="/" class="flex items-center">
            <img id="logo"
                src="{% static 'images/logo.png' %}"
                class="h-16 transition-all duration-300">
        </a>

        <!-- Desktop Menu -->
        <ul class="hidden md:flex space-x-10 font-medium relative">

            {% with current=request.path %}

            <li><a href="{% url 'home' %}" class="nav-link {% if current == '/' %}active{% endif %}">Home</a></li>

            <li><a href="{% url 'about' %}" class="nav-link {% if 'about' in current %}active{% endif %}">About</a></li>

            <li><a href="{% url 'Study_in_india' %}" class="nav-link {% if 'india' in current %}active{% endif %}">Study in India</a></li>

            <li><a href="{% url 'Study_in_abroad' %}" class="nav-link {% if 'abroad' in current %}active{% endif %}">Study Abroad</a></li>

            <li><a href="{% url 'faq' %}" class="nav-link {% if 'faq' in current %}active{% endif %}">FAQ</a></li>

            {% endwith %}

        </ul>

        <!-- CTA -->
        <a href="/contact"
            class="hidden md:flex items-center gap-2 bg-primary text-white px-5 py-2 rounded-lg hover:bg-secondary transition">
            <i class="fa-solid fa-paper-plane"></i>
            Contact
        </a>

        <!-- Hamburger -->
        <button id="menu-btn" class="md:hidden text-light text-2xl">
            <i class="fa-solid fa-bars"></i>
        </button>

    </div>

</nav>


<!-- OVERLAY -->
<div id="overlay" class="fixed inset-0 bg-black/40 hidden z-40"></div>


<!-- MOBILE MENU -->
<div id="mobile-menu"
    class="fixed top-0 right-0 h-full w-72 bg-dark/95 backdrop-blur-md transform translate-x-full transition-transform duration-300 ease-in-out z-50 md:hidden">

    <!-- Close -->
    <div class="flex justify-end p-6">
        <button id="close-menu" class="text-light text-2xl">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Links -->
    <ul class="flex flex-col space-y-6 px-8 text-light text-2xl font-medium">

        <li><a href="{% url 'home' %}" class="hover:text-secondary">Home</a></li>
        <li><a href="{% url 'about' %}" class="hover:text-secondary">About</a></li>
        <li><a href="{% url 'Study_in_india' %}" class="hover:text-secondary">Study in India</a></li>
        <li><a href="{% url 'Study_in_abroad' %}" class="hover:text-secondary">Study Abroad</a></li>
        <li><a href="{% url 'faq' %}" class="hover:text-secondary">FAQ</a></li>
        <li><a href="/contact" class="hover:text-secondary">Contact</a></li>

    </ul>

</div>


<!-- STYLES -->
<style>
    .nav-link {
        position: relative;
        color: #e5e7eb;
        transition: all 0.3s ease;
    }

    .nav-link::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -8px;
        width: 0%;
        height: 2px;
        background: #3b82f6;
        transition: all 0.3s ease;
        transform: translateX(-50%);
    }

    .nav-link:hover::after {
        width: 100%;
    }

    .nav-link.active {
        color: #3b82f6;
    }

    .nav-link.active::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -14px;
        transform: translateX(-50%);
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 6px solid #3b82f6;
    }
</style>


<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const navbar = document.getElementById("navbar");
    const navContainer = document.getElementById("nav-container");
    const logo = document.getElementById("logo");

    const openBtn = document.getElementById("menu-btn");
    const closeBtn = document.getElementById("close-menu");
    const menu = document.getElementById("mobile-menu");
    const overlay = document.getElementById("overlay");

    // Scroll Effect
    window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
            navbar.classList.add("bg-dark/80", "shadow-lg");
            navContainer.classList.replace("h-24", "h-16");
            logo.classList.replace("h-16", "h-10");
        } else {
            navbar.classList.remove("bg-dark/80", "shadow-lg");
            navContainer.classList.replace("h-16", "h-24");
            logo.classList.replace("h-10", "h-16");
        }
    });

    // Open Menu
    function openMenu() {
        menu.classList.remove("translate-x-full");
        menu.classList.add("translate-x-0");
        overlay.classList.remove("hidden");
        document.body.classList.add("overflow-hidden");
    }

    // Close Menu
    function closeMenu() {
        menu.classList.remove("translate-x-0");
        menu.classList.add("translate-x-full");
        overlay.classList.add("hidden");
        document.body.classList.remove("overflow-hidden");
    }

    // Events
    if (openBtn) openBtn.addEventListener("click", openMenu);
    if (closeBtn) closeBtn.addEventListener("click", closeMenu);
    if (overlay) overlay.addEventListener("click", closeMenu);

});
</script>
