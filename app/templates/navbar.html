{% load static %}

<nav class="bg-dark/50 backdrop-blur-md shadow-md fixed top-0 left-0 w-full z-50">

    <div class="max-w-7xl mx-auto px-6 py-4 text-sm flex justify-between items-center">

        <!-- Logo -->

        <a href="/" class="flex items-center space-x-2">
            <img src="{% static 'images/logo.png' %}" class="h-14">
        </a>


        <!-- Desktop Menu -->

        <ul class="hidden md:flex space-x-8 font-medium">

            <li>
                <a href="{% url 'home' %}" class="text-light hover:text-secondary transition">
                    Home
                </a>
            </li>

            <li>
                <a href="{% url 'about' %}" class="text-light hover:text-secondary transition">
                    About
                </a>
            </li>

            <li>
                <a href="{% url 'Study_in_india' %}" class="text-light hover:text-secondary transition">
                    Study in India
                </a>
            </li>

            <li>
                <a href="{% url 'Study_in_abroad' %}" class="text-light hover:text-secondary transition">
                    Study Abroad
                </a>
            </li>

            <li>
                <a href="{% url 'faq' %}" class="text-light hover:text-secondary transition">
                    FAQ
                </a>
            </li>

        </ul>


        <!-- CTA Button -->

        <a href="/contact"
            class="hidden md:flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-lg hover:bg-secondary transition">

            <i class="fa-solid fa-paper-plane"></i>
            <span>Contact</span>

        </a>


        <!-- Hamburger Button -->

        <button id="menu-btn" class="md:hidden text-light text-2xl">

            <i class="fa-solid fa-bars"></i>

        </button>

    </div>

</nav>


<!-- Overlay -->

<div id="overlay" class="fixed inset-0 bg-black/40 hidden z-40"></div>


<!-- Mobile Drawer Menu -->

<div id="mobile-menu"
    class="fixed top-0 right-0 h-full w-72 bg-dark/95 backdrop-blur-md transform translate-x-full transition-transform duration-300 ease-in-out z-50 md:hidden">

    <!-- Close Button -->

    <div class="flex justify-end p-6">

        <button id="close-menu" class="text-light text-2xl">

            <i class="fa-solid fa-xmark"></i>

        </button>

    </div>


    <!-- Mobile Links -->

    <ul class="flex flex-col space-y-6 px-8 text-light text-3xl font-medium">

        <li>
            <a href="{% url 'home' %}" class="hover:text-secondary mt-4">Home</a>
        </li>

        <li>
            <a href="{% url 'about' %}" class="hover:text-secondary">About</a>
        </li>

        <li>
            <a href="{% url 'Study_in_india' %}" class="hover:text-secondary">Study in India</a>
        </li>

        <li>
            <a href="{% url 'Study_in_abroad' %}" class="hover:text-secondary">Study Abroad</a>
        </li>

        <li>
            <a href="{% url 'faq' %}" class="hover:text-secondary">FAQ</a>
        </li>

        <li>
            <a href="/contact" class="hover:text-secondary">Contact</a>
        </li>


    </ul>

</div>


<!-- Script -->

<script>

    const openBtn = document.getElementById("menu-btn");
    const closeBtn = document.getElementById("close-menu");
    const menu = document.getElementById("mobile-menu");
    const overlay = document.getElementById("overlay");


    function openMenu() {
        menu.classList.remove("translate-x-full");
        menu.classList.add("translate-x-0");
        overlay.classList.remove("hidden");
    }

    function closeMenu() {
        menu.classList.remove("translate-x-0");
        menu.classList.add("translate-x-full");
        overlay.classList.add("hidden");
    }

    openBtn.addEventListener("click", openMenu);
    closeBtn.addEventListener("click", closeMenu);
    overlay.addEventListener("click", closeMenu);

</script>
